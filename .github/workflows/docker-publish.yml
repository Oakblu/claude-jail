name: Publish to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: false
          load: true
          tags: claude-jail:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test -- installed software
        run: CLAUDE_JAIL_IMAGE=claude-jail:test bash examples/test_01_software.sh

      - name: Test -- filesystem isolation
        run: CLAUDE_JAIL_IMAGE=claude-jail:test bash examples/test_02_isolation.sh

      - name: Test -- working directory mount
        run: CLAUDE_JAIL_IMAGE=claude-jail:test bash examples/test_03_workdir.sh

      - name: Test -- auth modes (fresh / local / persist)
        run: CLAUDE_JAIL_IMAGE=claude-jail:test bash examples/test_04_auth_modes.sh

      - name: Test -- concurrent instances
        run: CLAUDE_JAIL_IMAGE=claude-jail:test bash examples/test_05_multi_instance.sh

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: oakblu/claude-jail
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
