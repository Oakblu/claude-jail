name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          push: false
          load: true
          tags: claude-jail:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test -- installed software
        run: CLAUDE_JAIL_IMAGE=claude-jail:ci bash examples/test_01_software.sh

      - name: Test -- filesystem isolation
        run: CLAUDE_JAIL_IMAGE=claude-jail:ci bash examples/test_02_isolation.sh

      - name: Test -- working directory mount
        run: CLAUDE_JAIL_IMAGE=claude-jail:ci bash examples/test_03_workdir.sh

      - name: Test -- auth modes (fresh / local / persist)
        run: CLAUDE_JAIL_IMAGE=claude-jail:ci bash examples/test_04_auth_modes.sh

      - name: Test -- concurrent instances
        run: CLAUDE_JAIL_IMAGE=claude-jail:ci bash examples/test_05_multi_instance.sh
